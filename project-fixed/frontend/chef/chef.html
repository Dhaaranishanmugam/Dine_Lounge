<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Kitchen Display – Dine Lounge</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --pri:#E63946;--pri-dk:#c1121f;--pri-lt:#fff0f1;
  --grn:#1a9650;--grn-lt:#eaf7ef;
  --blue:#3B82F6;--blue-lt:#eff6ff;
  --acc:#FF9F1C;--acc-lt:#fff8ee;
  --bg:#F4F1EC;--card:#FFFFFF;--card2:#FAFAF7;
  --txt:#18181B;--muted:#71717A;--light:#A1A1AA;--border:#E8E2DA;
  --nav-h:66px;--strip-h:54px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --sh-md:0 4px 12px rgba(0,0,0,.09),0 16px 40px rgba(0,0,0,.1);
  --r:14px;--pill:999px;
  --pend-c:#b45309;--pend-bg:#fffbeb;--pend-b:#fcd34d;
  --prep-c:#1d4ed8;--prep-bg:#eff6ff;--prep-b:#93c5fd;
  --rdy-c:#15803d; --rdy-bg:#f0fdf4; --rdy-b:#86efac;
  --srv-c:#7c3aed; --srv-bg:#f5f3ff; --srv-b:#c4b5fd;
  --can-c:#b91c1c; --can-bg:#fff0f1; --can-b:#fca5a5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);}
body{display:flex;flex-direction:column;}

/* NAV */
.chef-nav{height:var(--nav-h);flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:var(--sh);position:sticky;top:0;z-index:100;}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-logo{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#E63946,#c1121f);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(230,57,70,.35);flex-shrink:0;}
.nav-logo svg{width:28px;height:28px;}
.nav-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--txt);}
.nav-sub{font-size:.6rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.1em;}
.nav-stats{display:flex;gap:8px;}
.stat-pill{display:flex;align-items:center;gap:9px;padding:7px 16px;border-radius:var(--pill);font-size:.78rem;font-weight:700;border:1.5px solid;}
.sp-pend{background:var(--pend-bg);color:var(--pend-c);border-color:var(--pend-b);}
.sp-prep{background:var(--prep-bg);color:var(--prep-c);border-color:var(--prep-b);}
.sp-rdy{background:var(--rdy-bg);color:var(--rdy-c);border-color:var(--rdy-b);}
.stat-num{font-size:1.05rem;font-weight:800;line-height:1;}
.nav-right{display:flex;align-items:center;gap:8px;}
.chef-badge{background:var(--pri-lt);color:var(--pri);font-size:.75rem;font-weight:700;padding:5px 13px;border-radius:var(--pill);border:1.5px solid #fccfd2;}
.nbtn{padding:8px 16px;border-radius:var(--pill);font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:var(--card);color:var(--muted);}
.nbtn:hover{border-color:var(--pri);color:var(--pri);}
.nbtn.danger{background:linear-gradient(135deg,var(--pri),var(--pri-dk));border:none;color:#fff;box-shadow:0 2px 8px rgba(230,57,70,.3);}
.nbtn.danger:hover{box-shadow:0 4px 16px rgba(230,57,70,.4);transform:translateY(-1px);}

/* FILTER BAR */
.filter-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:8px;align-items:center;height:var(--strip-h);flex-shrink:0;}
.fpill{padding:7px 18px;border-radius:var(--pill);font-family:'Plus Jakarta Sans',sans-serif;font-size:.79rem;font-weight:700;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.fpill:hover{color:var(--txt);border-color:#d4cfc8;}
.fpill.active{background:var(--pri);border-color:var(--pri);color:#fff;box-shadow:0 3px 12px rgba(230,57,70,.3);}
.fpill:active{transform:scale(.95);}
.order-count-badge{margin-left:auto;font-size:.74rem;font-weight:600;color:var(--muted);}

/* MAIN */
.chef-main{flex:1;padding:22px 24px 32px;}

/* UNIFORM GRID */
.orders-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  align-items:start;
}
.grid-empty{grid-column:1/-1;text-align:center;padding:80px 40px;color:var(--light);}
.ge-icon{font-size:3.5rem;opacity:.12;display:block;margin-bottom:14px;}
.ge-title{font-size:.92rem;font-weight:700;color:var(--muted);}

/* ORDER CARD */
.ocard{
  background:var(--card);border-radius:var(--r);
  border:1.5px solid var(--border);overflow:hidden;
  box-shadow:var(--sh);border-top-width:4px;
  display:flex;flex-direction:column;
  transition:transform .25s cubic-bezier(.34,1.4,.64,1),box-shadow .25s;
  animation:cardIn .3s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ocard:hover{transform:translateY(-3px);box-shadow:var(--sh-md);}
.ocard[data-status="Pending"]   {border-top-color:var(--pend-c);}
.ocard[data-status="Preparing"] {border-top-color:var(--prep-c);}
.ocard[data-status="Ready"]     {border-top-color:var(--rdy-c);}
.ocard[data-status="Served"]    {border-top-color:var(--srv-c);opacity:.75;}
.ocard[data-status="Cancelled"] {border-top-color:var(--can-c);opacity:.55;}

/* HEAD — always visible */
.ocard-head{padding:13px 14px 11px;background:var(--card2);border-bottom:1.5px solid var(--border);}
.ocard-head-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.ocard-oid{font-size:.64rem;font-weight:800;letter-spacing:.12em;color:var(--light);text-transform:uppercase;}
.ostatus{padding:4px 10px;border-radius:var(--pill);font-size:.66rem;font-weight:800;letter-spacing:.04em;white-space:nowrap;border:1.5px solid;flex-shrink:0;}
.os-Pending  {background:var(--pend-bg);border-color:var(--pend-b);color:var(--pend-c);}
.os-Preparing{background:var(--prep-bg);border-color:var(--prep-b);color:var(--prep-c);}
.os-Ready    {background:var(--rdy-bg);border-color:var(--rdy-b);color:var(--rdy-c);}
.os-Served   {background:var(--srv-bg,#f5f3ff);border-color:var(--srv-b);color:var(--srv-c);}
.os-Cancelled{background:var(--can-bg);border-color:var(--can-b);color:var(--can-c);}
.ocard-name{font-size:1.05rem;font-weight:800;color:var(--txt);line-height:1.2;margin-bottom:3px;}
.ocard-meta{display:flex;align-items:center;gap:8px;font-size:.73rem;color:var(--muted);font-weight:500;}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--light);display:inline-block;}

/* BODY — always visible info */
.ocard-body{padding:12px 14px;flex:1;}
.ocard-time{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;color:var(--muted);background:var(--bg);padding:3px 9px;border-radius:var(--pill);margin-bottom:10px;border:1px solid var(--border);}
.ocard-time i{font-size:.65rem;}

/* Summary row */
.ocard-summary{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.osum-total{font-weight:800;color:var(--txt);font-size:.9rem;}
.pay-badge{padding:3px 9px;border-radius:var(--pill);font-size:.68rem;font-weight:800;border:1.5px solid;}
.pay-Paid{background:var(--grn-lt);color:var(--grn);border-color:#86efac;}
.pay-Pending{background:var(--pend-bg);color:var(--pend-c);border-color:var(--pend-b);}
.pay-Failed{background:var(--pri-lt);color:var(--pri-dk);border-color:#fca5a5;}

/* TOGGLE BUTTON */
.btn-toggle-items{
  width:100%;padding:8px 12px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--bg);color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.77rem;font-weight:700;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:space-between;
}
.btn-toggle-items:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-lt);}
.ti-left{display:flex;align-items:center;gap:6px;}
.ti-count{background:var(--pri);color:#fff;font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:var(--pill);}
.ti-icon{font-size:.68rem;transition:transform .25s ease;}
.btn-toggle-items.open .ti-icon{transform:rotate(180deg);}

/* COLLAPSIBLE PANEL */
.items-panel{
  overflow:hidden;max-height:0;
  transition:max-height .32s ease,opacity .25s ease,margin .25s ease;
  opacity:0;margin-top:0;
}
.items-panel.open{max-height:600px;opacity:1;margin-top:10px;}
.items-inner{border:1.5px solid var(--border);border-radius:10px;background:var(--card2);padding:10px 12px;}
.items-header-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--light);margin-bottom:7px;}
.items-list{list-style:none;padding:0;margin:0;}
.items-list li{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;border-radius:8px;transition:background .15s;font-size:.82rem;gap:8px;}
.items-list li:hover{background:var(--bg);}
.item-name{color:var(--txt);font-weight:500;flex:1;line-height:1.4;}
.item-qty{background:var(--blue-lt);color:var(--blue);font-size:.66rem;font-weight:800;padding:2px 8px;border-radius:var(--pill);flex-shrink:0;}
.ocard-note{margin-top:8px;padding:7px 10px;background:var(--acc-lt);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;}
.note-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);font-weight:800;margin-bottom:2px;}
.note-txt{font-size:.76rem;color:#7a6a40;line-height:1.5;margin:0;}

/* FOOTER */
.ocard-foot{padding:10px 14px;background:var(--card2);border-top:1.5px solid var(--border);}
.btn-update{width:100%;padding:9px 14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--pri),var(--pri-dk));color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.81rem;font-weight:800;cursor:pointer;transition:all .22s;box-shadow:0 2px 8px rgba(230,57,70,.25);}
.btn-update:hover{box-shadow:0 5px 18px rgba(230,57,70,.38);transform:translateY(-1px);}
.btn-update:active{transform:scale(.97);}

/* MODAL */
.modal-content{border:none;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.14);}
.modal-header{background:linear-gradient(135deg,var(--pri),var(--pri-dk));border:none;border-radius:18px 18px 0 0;padding:18px 22px;}
.modal-title{font-family:'Playfair Display',serif;font-size:1rem;color:#fff;}
.modal-body{padding:20px 22px;background:#fafaf8;}
.modal-footer{border-top:1.5px solid var(--border);padding:14px 22px;gap:10px;background:#fafaf8;border-radius:0 0 18px 18px;}
.btn-close{filter:invert(1) brightness(2) opacity(.7);}
.modal-order-box{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:18px;}
.mob-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.84rem;border-bottom:1px solid var(--bg);}
.mob-row:last-child{border:none;}
.mob-l{color:var(--muted);}
.mob-v{font-weight:700;}
.mob-items{font-size:.78rem;color:var(--muted);margin-top:8px;line-height:1.6;}
.upd-lbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);display:block;margin-bottom:10px;}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.status-opt{padding:11px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.79rem;font-weight:700;color:var(--muted);transition:all .2s;text-align:center;}
.status-opt:hover{border-color:var(--pri);color:var(--txt);}
.status-opt.sel{color:#fff!important;border-color:transparent!important;}
.status-opt[data-s="Pending"].sel  {background:var(--pend-c);}
.status-opt[data-s="Preparing"].sel{background:var(--prep-c);}
.status-opt[data-s="Ready"].sel    {background:var(--rdy-c);}
.status-opt[data-s="Served"].sel   {background:var(--srv-c);}
.notes-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--txt);font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;resize:vertical;transition:border-color .2s;}
.notes-input:focus{outline:none;border-color:var(--pri);}
.btn-modal-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);padding:9px 20px;border-radius:10px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:600;transition:all .18s;}
.btn-modal-cancel:hover{border-color:var(--pri);color:var(--pri);}
.btn-modal-confirm{background:linear-gradient(135deg,var(--pri),var(--pri-dk));border:none;color:#fff;padding:9px 24px;border-radius:10px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:800;transition:all .2s;}
.btn-modal-confirm:hover{box-shadow:0 5px 16px rgba(230,57,70,.3);}

.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@media(max-width:1400px){.orders-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:1000px){.orders-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.orders-grid{grid-template-columns:1fr;}.chef-main{padding:14px;}}
</style>
</head>
<body>

<nav class="chef-nav">
  <div class="nav-left">
    <div class="nav-logo">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">

</nav>

<div class="filter-bar">
  <button class="fpill active" onclick="filterOrders('All',this)">All Orders</button>
  <button class="fpill" onclick="filterOrders('Pending',this)">⏳ Pending</button>
  <button class="fpill" onclick="filterOrders('Preparing',this)">🔥 Preparing</button>
  <button class="fpill" onclick="filterOrders('Ready',this)">✅ Ready</button>
  <button class="fpill" onclick="filterOrders('Served',this)">🎉 Served</button>

</div>

<div class="chef-main">
  <div class="orders-grid" id="ordersContainer">

      <span class="ge-icon"><i class="fas fa-circle-notch fa-spin"></i></span>

        <h5 class="modal-title"><i class="fas fa-pen-to-square me-2" style="font-size:.88rem;"></i>Update Order Status</h5>

      </div>

          <button class="status-opt" data-s="Preparing" onclick="selectStatus(this)">🔥 Preparing</button>
          <button class="status-opt" data-s="Ready"     onclick="selectStatus(this)">✅ Ready</button>

<div class="toast-wrap" id="toastWrap"></div>

<script>

function getTimeElapsed(createdAt){
  if(!createdAt)return'—';
  const diff=Math.floor((Date.now()-new Date(createdAt))/60000);
  if(diff<1)return'Just now';
  if(diff<60)return diff+'m ago';
  return Math.floor(diff/60)+'h '+diff%60+'m ago';
}

/* Toggle items panel */
window.toggleItems=function(btn,panelId){
  const panel=document.getElementById(panelId);
  if(!panel)return;
  const isOpen=panel.classList.toggle('open');
  btn.classList.toggle('open',isOpen);
  const lbl=btn.querySelector('.ti-label');
  if(lbl)lbl.textContent=isOpen?'Hide Items':'View Items';
};

/* Render orders */
function renderOrders(orders){
  const container=document.getElementById('ordersContainer');
  if(!container)return;

  document.getElementById('cnt-pending').textContent  =allOrders.filter(o=>o.orderStatus==='Pending').length;
  document.getElementById('cnt-preparing').textContent=allOrders.filter(o=>o.orderStatus==='Preparing').length;
  document.getElementById('cnt-ready').textContent    =allOrders.filter(o=>o.orderStatus==='Ready').length;

  const filtered=currentFilter==='All'?orders:orders.filter(o=>o.orderStatus===currentFilter);
  document.getElementById('orderCountBadge').textContent=filtered.length+' order'+(filtered.length!==1?'s':'');

  if(!filtered||!filtered.length){
    container.innerHTML=`<div class="grid-empty">
      <span class="ge-icon"><i class="fas fa-bowl-rice"></i></span>
      <div class="ge-title">No ${currentFilter!=='All'?currentFilter.toLowerCase()+' ':''}orders right now</div>
    </div>`;
    return;
  }

  container.innerHTML=filtered.map((order,i)=>{
    const status=order.orderStatus||'Pending';
    const timeStr=order.createdAt
      ?new Date(order.createdAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})
      :'—';
    const elapsed=getTimeElapsed(order.createdAt);
    const shortId=(order.orderId||order._id||'').slice(-6).toUpperCase();
    const items=order.items||[];
    const itemsHtml=items.map(it=>`
      <li>
        <span class="item-name">${it.name||'Unknown'}</span>
        <span class="item-qty">×${it.quantity||1}</span>
      </li>`).join('');
    const noteHtml=order.specialNotes
      ?`<div class="ocard-note"><div class="note-lbl">Note</div><p class="note-txt">${order.specialNotes}</p></div>`:'';
    const payStatus=order.paymentStatus||'Pending';
    const panelId='panel-'+i+'-'+shortId;

    return`
    <div class="ocard" data-status="${status}" data-id="${order._id}" style="animation-delay:${Math.min(i*.04,.4)}s">
      <div class="ocard-head">
        <div class="ocard-head-row1">
          <span class="ocard-oid">#${shortId}</span>
          <span class="ostatus os-${status}">${status}</span>
        </div>
        <div class="ocard-name">${order.customerName||'Guest'}</div>
        <div class="ocard-meta">
          ${order.tableNumber?`<span>🪑 Table ${order.tableNumber}</span><span class="meta-dot"></span>`:''}
          <span>${order.diningMode||'Dine-In'}</span>
        </div>
      </div>

      <div class="ocard-body">
        <div class="ocard-time"><i class="fas fa-clock"></i>${timeStr} · ${elapsed}</div>
        <div class="ocard-summary">
          <span class="osum-total">₹${order.total||0}</span>
          <span class="pay-badge pay-${payStatus}">${payStatus}</span>
        </div>

        <button class="btn-toggle-items" onclick="toggleItems(this,'${panelId}')">
          <span class="ti-left">
            <i class="fas fa-receipt" style="font-size:.72rem;"></i>
            <span class="ti-label">View Items</span>
            <span class="ti-count">${items.length}</span>
          </span>
          <i class="fas fa-chevron-down ti-icon"></i>
        </button>

        <div class="items-panel" id="${panelId}">
          <div class="items-inner">
            <div class="items-header-lbl">Order Items</div>
            <ul class="items-list">${itemsHtml}</ul>
            ${noteHtml}
          </div>
        </div>
      </div>

      <div class="ocard-foot">
        <button class="btn-update" onclick="openUpdateModal('${order._id}')">
          <i class="fas fa-pen-to-square me-2" style="font-size:.75rem;"></i>Update Status
        </button>
      </div>
    </div>`;
  }).join('');
}

window.openUpdateModal=function(orderId){
  selectedOrderId=orderId;
  selectedNewStatus=null;
  document.querySelectorAll('.status-opt').forEach(b=>b.classList.remove('sel'));
  const order=allOrders.find(o=>o._id===orderId);
  const box=document.getElementById('orderDetailsModal');
  if(order&&box){
    const shortId=(order.orderId||order._id||'').slice(-6).toUpperCase();
    box.innerHTML=`
      <div class="mob-row"><span class="mob-l">Customer</span><span class="mob-v">${order.customerName||'Guest'}</span></div>
      <div class="mob-row"><span class="mob-l">Order</span><span class="mob-v">#${shortId}</span></div>
      ${order.tableNumber?`<div class="mob-row"><span class="mob-l">Table</span><span class="mob-v">${order.tableNumber}</span></div>`:''}
      <div class="mob-row"><span class="mob-l">Current Status</span><span class="mob-v" style="color:var(--pri);">${order.orderStatus||'Pending'}</span></div>
      <div class="mob-items">${(order.items||[]).map(it=>`${it.name} ×${it.quantity}`).join(' &nbsp;·&nbsp; ')}</div>`;
    const cur=document.querySelector(`.status-opt[data-s="${order.orderStatus}"]`);
    if(cur)cur.classList.add('sel');
    selectedNewStatus=order.orderStatus;
  }
  const notesEl=document.getElementById('specialNotes');
  if(notesEl)notesEl.value=order?.specialNotes||'';
  new bootstrap.Modal(document.getElementById('updateModal')).show();
};

window.selectStatus=function(btn){
  document.querySelectorAll('.status-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  selectedNewStatus=btn.getAttribute('data-s');
};

window.filterOrders=function(status,btn){
  document.querySelectorAll('.fpill').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  currentFilter=status;
  renderOrders(allOrders);
};

function refreshOrders(){if(typeof fetchOrders==='function')fetchOrders();}

function showToast(message,type){
  const colors={
    success:{bg:'#E8F5EE',b:'#86efac',c:'#15803d'},
    error:  {bg:'#fff0f1',b:'#fca5a5',c:'#b91c1c'},
    info:   {bg:'#eff6ff',b:'#93c5fd',c:'#1d4ed8'}
  };
  const s=colors[type]||colors.info;
  const t=document.createElement('div');
  t.style.cssText=`padding:12px 18px;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;background:${s.bg};border:1.5px solid ${s.b};color:${s.c};box-shadow:0 8px 24px rgba(0,0,0,.09);min-width:200px;animation:slideIn .25s ease;`;
  t.textContent=message;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>t.remove(),3200);
}
</script>
<style>@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}</style>
</body>
</html>
